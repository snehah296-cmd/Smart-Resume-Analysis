<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Professional Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 300% 300%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-nav {
            flex: 1;
        }

        .logout-nav {
            flex: 1;
            text-align: right;
        }

        .back-link, .logout-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-link {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .back-link:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateX(-3px);
        }

        .back-link svg {
            transition: transform 0.3s ease;
        }

        .back-link:hover svg {
            transform: translateX(-2px);
        }

        .logout-link {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .logout-link:hover {
            background: rgba(231, 76, 60, 0.2);
            transform: translateX(3px);
        }

        .logout-link svg {
            transition: transform 0.3s ease;
        }

        .logout-link:hover svg {
            transform: translateX(2px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
            font-weight: 400;
        }

        .form-container {
            position: relative;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1em;
            transition: color 0.3s ease;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
            color: #2c3e50;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .form-group:focus-within::after {
            width: 100%;
        }

        .form-group:focus-within label {
            color: #667eea;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-elements::before,
        .floating-elements::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .floating-elements::before {
            top: -50px;
            right: -50px;
            animation-delay: 0s;
        }

        .floating-elements::after {
            bottom: -50px;
            left: -50px;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .success-message {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .btn-container {
                flex-direction: column;
            }

            .top-nav {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .back-nav, .logout-nav {
                text-align: center;
            }
        }

        /* Enhanced form styling */
        .form-group input[type="file"] {
            padding: 20px;
            border: 2px dashed #e8ecf0;
            background: #f8f9fa;
            cursor: pointer;
        }

        .form-group input[type="file"]:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .required {
            color: #e74c3c;
            margin-left: 5px;
        }

        .form-hint {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="floating-elements"></div>
        
        <div class="top-nav">
            <div class="back-nav">
                <a href="{% url 'company_jobs' %}" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to My Jobs
                </a>
            </div>
            <div class="logout-nav">
                <a href="{% url 'logout_view' %}" class="logout-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                </a>
            </div>
        </div>

        <div class="header">
            <h1>Post New Job</h1>
            <p>Create an opportunity that attracts top talent</p>
        </div>

        <div class="success-message" id="successMessage">
            Job posted successfully! 🎉
        </div>
<form method="post" class="form-container">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="title">Job Title <span class="required">*</span></label>
        <input type="text" id="title" name="title" placeholder="e.g., Senior Software Engineer" required>
        <div class="form-hint">Be specific and descriptive</div>
    </div>

    <div class="form-group">
        <label for="company">Company <span class="required">*</span></label>
        <input type="text" id="company" name="company" placeholder="Your company name" required>
    </div>

    <div class="form-group">
        <label for="location">Location <span class="required">*</span></label>
        <input type="text" id="location" name="location" placeholder="e.g., San Francisco, CA or Remote" required>
    </div>

    <div class="form-group">
        <label for="job_type">Job Type <span class="required">*</span></label>
        <select id="job_type" name="job_type" required>
            <option value="">Select job type</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="freelance">Freelance</option>
            <option value="internship">Internship</option>
        </select>
    </div>

    <div class="form-group">
        <label for="salary_range">Salary Range</label>
        <input type="text" id="salary_range" name="salary_range" placeholder="e.g., $80,000 - $120,000">
        <div class="form-hint">Optional but recommended for better applications</div>
    </div>

    <div class="form-group">
        <label for="description">Job Description <span class="required">*</span></label>
        <textarea id="description" name="description" placeholder="Describe the role, responsibilities, and what you're looking for in a candidate..." required></textarea>
        <div class="form-hint">Include key responsibilities and requirements</div>
    </div>

    <div class="form-group">
        <label for="required_skills">Required Skills <span class="required">*</span></label>
        <textarea id="required_skills" name="required_skills" placeholder="python, django, sql, javascript (comma separated)" required></textarea>
        <div class="form-hint">Enter skills separated by commas</div>
    </div>

    <div class="form-group">
        <label for="benefits">Benefits & Perks</label>
        <textarea id="benefits" name="benefits" placeholder="Health insurance, flexible hours, remote work options, etc."></textarea>
    </div>

    <div class="form-group">
        <label for="contact_email">Contact Email <span class="required">*</span></label>
        <input type="email" id="contact_email" name="contact_email" placeholder="recruiting@company.com" required>
    </div>

    <div class="btn-container">
        <button type="submit" class="btn btn-primary">
            Post Job Opening
        </button>
        <a href="{% url 'company_jobs' %}" class="btn btn-secondary">
            Cancel
        </a>
    </div>
</form>
     
    
    
    </div>

    <script>
        function showSuccess(event) {
            event.preventDefault();
            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'block';
            
            // Simulate form submission
            setTimeout(() => {
                successMessage.style.display = 'none';
                // You would normally submit the form here
                // event.target.submit();
            }, 3000);
        }

        // Add smooth scrolling for mobile
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input, textarea, select');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    if (window.innerWidth <= 768) {
                        setTimeout(() => {
                            this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 300);
                    }
                });
            });
        });

        // Add real-time validation feedback
        const requiredFields = document.querySelectorAll('input[required], textarea[required], select[required]');
        requiredFields.forEach(field => {
            field.addEventListener('blur', function() {
                if (this.value.trim() === '') {
                    this.style.borderColor = '#e74c3c';
                } else {
                    this.style.borderColor = '#27ae60';
                }
            });
        });
    </script>
</body>
</html>
