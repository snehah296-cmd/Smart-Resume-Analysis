<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Smart Resume{% endblock %}</title>
    <style>
        /* Simple navbar styling */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: #f2f2f2;
            padding: 14px 20px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        .container {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'upload_resume' %}">Upload Resume</a>
        <a href="/jobs/post/">Post Job</a>
        <a href="/jobs/myjobs/">My Jobs</a>
        <a href="/accounts/login/">Login</a>
        <a href="/admin/">Admin</a>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
